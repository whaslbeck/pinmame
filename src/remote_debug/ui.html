<!DOCTYPE html>
<html>
<head>
    <title>PinMAME Advanced Debugger</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: #2d2d2d;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3d3d3d;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 400px;
            background: #252526;
            border-right: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-y: auto;
            background: #1e1e1e;
        }

        .panel {
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 12px;
        }

        .panel h2 {
            margin-top: 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #3d3d3d;
            padding-bottom: 8px;
            color: #4fc1ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            background: #0e639c;
            color: white;
            border: none;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 0.8rem;
            margin-left: 2px;
        }

        .btn:hover {
            background: #1177bb;
        }

        .btn-danger {
            background: #a1260d;
        }

        .btn-success {
            background: #388a34;
        }

        .btn-cabinet {
            background: #444;
            border: 1px solid #666;
            width: 60px;
            height: 30px;
            margin: 2px;
            font-weight: bold;
            font-size: 0.7rem;
        }

        .btn-cabinet:active {
            background: #00ff00;
            color: #000;
        }

        .reg-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            font-family: 'Consolas', monospace;
        }

        .reg-item {
            background: #1e1e1e;
            padding: 4px 8px;
            border-radius: 2px;
            display: flex;
            justify-content: space-between;
            border-left: 3px solid #4fc1ff;
            align-items: center;
        }

        .reg-label {
            color: #858585;
            font-size: 0.75rem;
        }

        .reg-val {
            color: #dcdcaa;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .reg-dec {
            color: #6a9955;
            font-size: 0.7rem;
            margin-left: 5px;
        }

        .flags-grid {
            display: flex;
            gap: 2px;
            font-family: 'Consolas', monospace;
            margin-top: 10px;
        }

        .flag {
            flex: 1;
            text-align: center;
            background: #333;
            padding: 4px 0;
            border-radius: 2px;
            font-size: 0.75rem;
            color: #555;
        }

        .flag.active {
            background: #388a34;
            color: #fff;
            font-weight: bold;
        }

        .hex-table,
        .dasm-table {
            font-family: 'Consolas', monospace;
            border-collapse: collapse;
            width: 100%;
            font-size: 0.85rem;
            background: #1e1e1e;
        }

        .hex-table td,
        .dasm-table td {
            padding: 3px 8px;
            border: 1px solid #2d2d2d;
        }

        .addr-col {
            color: #858585;
            width: 70px;
            background: #252526;
            text-align: right;
            padding-right: 12px !important;
        }

        .hex-byte {
            cursor: pointer;
            text-align: center;
            width: 30px;
            color: #9cdcfe;
        }

        .hex-ascii {
            color: #6a9955;
            width: 120px;
            border-left: 2px solid #3d3d3d !important;
            font-size: 0.8rem;
        }

        .current-pc {
            background: #3e3e10 !important;
        }

        #dmd-canvas {
            background: #000;
            width: 100%;
            image-rendering: pixelated;
            border: 1px solid #444;
        }

        #seg-canvas {
            background: #000;
            width: 100%;
            border: 1px solid #444;
        }

        .status-tag {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            background: #444;
            margin-right: 12px;
            font-weight: bold;
        }

        .status-paused {
            background: #a1260d;
            color: white;
        }

        .status-running {
            background: #388a34;
            color: white;
        }

        input {
            background: #3c3c3c;
            border: 1px solid #3d3d3d;
            color: #fff;
            padding: 4px 8px;
            border-radius: 2px;
            outline: none;
            font-family: 'Consolas', monospace;
        }

        .tool-bar {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            background: #252526;
            padding: 8px;
            border-radius: 4px;
        }

        #console-log {
            background: #000;
            color: #6a9955;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            height: 120px;
            overflow-y: scroll;
            padding: 10px;
            border: 1px solid #333;
            margin-top: 10px;
        }

        .console-line {
            margin-bottom: 2px;
            border-bottom: 1px solid #111;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            background: #333;
            padding: 4px;
            border-radius: 2px;
        }

        .matrix-dot {
            width: 14px;
            height: 14px;
            background: #222;
            border-radius: 2px;
            border: 1px solid #444;
        }

        .matrix-dot.active-lamp {
            background: #ffff00;
            box-shadow: 0 0 5px #ffff00;
        }

        .matrix-dot.active-sw {
            background: #00ff00;
        }

        .matrix-dot.active-sol {
            background: #ff0000;
            box-shadow: 0 0 5px #ff0000;
        }

        .sw-clickable {
            cursor: pointer;
        }

        .point-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px;
            border-bottom: 1px solid #333;
            font-size: 0.8rem;
        }

        .stack-item {
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            padding: 2px 8px;
            border-left: 3px solid #6a9955;
            margin-bottom: 2px;
            background: #1e1e1e;
            cursor: pointer;
        }

        .stack-item:hover {
            background: #2d2d2d;
        }
    </style>
</head>

<body>
    <header>
        <div><span style="color: #4fc1ff; font-weight: bold; font-size: 1.1rem;">PinMAME Multi-Sys Debug</span><span
                id="game-title" style="margin-left: 15px; color: #aaaaaa; font-size: 0.9rem;">...</span></div>
        <div><span id="status-mode" class="status-tag">OFFLINE</span>
            <button class="btn" onclick="control('pause')">Pause</button><button class="btn"
                onclick="control('resume')">Resume</button><button class="btn"
                onclick="control('step')">Step</button><button class="btn btn-success"
                onclick="control('stepover')">Step Over</button><button class="btn btn-danger"
                onclick="emulatorExit()">Exit</button>
        </div>
    </header>
    <div class="main-container">
        <div class="sidebar">
            <div id="display-panel" class="panel" style="margin: 10px;">
                <h2 id="display-title">System Display</h2>
                <div id="dmd-container"><canvas id="dmd-canvas"></canvas></div>
                <div id="seg-container" style="display:none;"><canvas id="seg-canvas"></canvas></div>
                <div style="margin-top: 5px; font-size: 0.7rem; color: #858585;"><span id="dmd-res">0x0</span> | <input
                        type="checkbox" id="auto-refresh-dmd" checked> Live</div>
            </div>
            <div id="cpu-panels-container"></div>
            <div class="panel" style="margin: 10px;">
                <h2>Callstack</h2>
                <div id="callstack-view" style="max-height: 150px; overflow-y: auto;"></div>
            </div>
            <div class="panel" style="margin: 10px;">
                <h2>Cabinet & Service</h2>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
                    <button class="btn btn-cabinet" onmousedown="pulseSw(1,1)" onmouseup="pulseSw(1,0)">COIN</button>
                    <button class="btn btn-cabinet" onmousedown="pulseSw(13,1)" onmouseup="pulseSw(13,0)"
                        style="background: #0e639c;">START</button>
                    <button class="btn btn-cabinet" onmousedown="pulseSw(5,1)" onmouseup="pulseSw(5,0)">ESC</button>
                    <button class="btn btn-cabinet" onmousedown="pulseSw(6,1)" onmouseup="pulseSw(6,0)">-</button>
                    <button class="btn btn-cabinet" onmousedown="pulseSw(7,1)" onmouseup="pulseSw(7,0)">+</button>
                    <button class="btn btn-cabinet" onmousedown="pulseSw(8,1)" onmouseup="pulseSw(8,0)">ENT</button>
                </div>
            </div>
            <div class="panel" style="margin: 10px;">
                <h2>System Info</h2>
                <div class="reg-item"><span class="reg-label">Active Bank</span><span id="wpc-bank"
                        class="reg-val">?</span></div>
            </div>
            <div class="panel" style="margin: 10px;">
                <h2>Matrix Visualizer</h2>
                <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">Lamps (8x8)</div>
                <div id="matrix-lamps" class="matrix"></div>
                <div style="font-size: 0.7rem; color: #888; margin: 10px 0 5px 0;">Switches (8x8)</div>
                <div id="matrix-sw" class="matrix"></div>
                <div style="font-size: 0.7rem; color: #888; margin: 10px 0 5px 0;">Solenoids (32)</div>
                <div id="matrix-sol" class="matrix" style="grid-template-columns: repeat(8, 1fr);"></div>
                <div style="font-size: 0.7rem; color: #888; margin: 10px 0 5px 0;">Direct (8)</div>
                <div id="matrix-ded" class="matrix" style="grid-template-columns: repeat(8, 1fr);"></div>
            </div>
        </div>
        <div class="content">
            <div class="panel" style="display: flex; flex-direction: column; height: 350px;">
                <h2>Disassembler</h2>
                <div class="tool-bar">Bank: <input type="text" id="dasm-bank" value="" style="width: 35px;"
                        placeholder="Cur"> Addr: <input type="text" id="dasm-addr" value="0x0000" style="width: 70px;">
                    CPU: <input type="number" id="dasm-cpu" value="0" style="width: 35px;"> <button class="btn"
                        onclick="refreshDasm()">Go</button><button class="btn" onclick="followPC()">Follow PC</button>
                </div>
                <div style="flex: 1; overflow-y: auto;">
                    <table class="dasm-table" id="dasm-view"></table>
                </div>
            </div>
            <div class="panel">
                <h2>Control Center</h2>
                <div class="row">
                    <div class="col" style="display: flex; gap: 10px; align-items: flex-start;">
                        <div style="flex: 1;">
                            <div style="margin-bottom: 5px;"><input type="text" id="bp-bank" placeholder="Bank"
                                    style="width: 35px;"> <input type="text" id="bp-addr" placeholder="Addr"
                                    style="width: 60px;"> <button class="btn btn-success btn-small"
                                    onclick="addPoint('bp')">+BP</button> <select id="wp-mode"
                                    style="background:#3c3c3c;color:#fff;">
                                    <option value="1">R</option>
                                    <option value="2">W</option>
                                    <option value="3">RW</option>
                                </select> <button class="btn btn-success btn-small"
                                    onclick="addPoint('wp')">+WP</button></div>
                            <div id="point-list" style="max-height: 100px; overflow-y: auto; background: #111;"></div>
                        </div>
                        <div style="flex: 1;">
                            <div style="display:flex;gap:5px;margin-bottom:10px;"><input type="text" id="cli-cmd"
                                    placeholder="Classic MAME Command..." style="flex:1;"><button class="btn"
                                    onclick="runCLI()">Exec</button></div>
                            <button class="btn btn-danger btn-small" onclick="nvramClear()">Wipe NVRAM & Reset</button>
                        </div>
                    </div>
                </div>
                <div id="console-log"></div>
            </div>
            <div class="panel">
                <h2>Memory Hex Editor & Search</h2>
                <div class="tool-bar">
                    Addr: <input type="text" id="mem-addr" value="0x0000" style="width: 70px;">
                    Size: <input type="number" id="mem-size" value="256" style="width: 60px;">
                    CPU: <input type="number" id="mem-cpu" value="0" style="width: 35px;">
                    <button class="btn" onclick="refreshMemory()">Read</button>
                </div>
                <div class="tool-bar" style="background: #2d2d2d; border: 1px dashed #444;">
                    Search HEX: <input type="text" id="search-pat" placeholder="e.g. 414243" style="flex:1;">
                    <button class="btn btn-success" onclick="runSearch()">Find</button>
                </div>
                <div id="hex-container"
                    style="overflow-x: auto; background: #1e1e1e; max-height: 180px; overflow-y: auto;">
                    <table class="hex-table" id="hex-view"></table>
                </div>
            </div>
        </div>
    </div>
    <script>
let isPaused = false;
let lastPC = 0;
let dmdWidth = 128;
let dmdHeight = 32;
let switchStates = new Array(64).fill(false);
let dedicatedStates = new Array(8).fill(false);

function control(cmd) {
    fetch('/api/debugger/control?cmd=' + cmd).then(r => r.json()).then(updateStatus);
}

function pulseSw(sw, val) {
    fetch(`/api/input?sw=${sw}&val=${val}`).then(updateStatus);
}

function nvramClear() {
    if (confirm("Wipe NVRAM?")) fetch('/api/debugger/nvram?cmd=clear').then(() => updateStatus());
}

function emulatorExit() {
    if (confirm("Exit Emulator?")) {
        fetch('/api/debugger/control?cmd=exit');
        document.body.innerHTML = "<h1>Disconnected</h1>";
    }
}

function runSearch() {
    const addr = document.getElementById('mem-addr').value;
    const pat = document.getElementById('search-pat').value;
    const cpu = document.getElementById('mem-cpu').value;
    if (!pat) return;
    fetch(`/api/debugger/memory/find?addr=${addr}&size=0x8000&pattern=${pat}&cpu=${cpu}`).then(r => r.json()).then(data => {
        if (data.status === 'ok') {
            const found = '0x' + data.found.toString(16).toUpperCase();
            document.getElementById('mem-addr').value = found;
            document.getElementById('dasm-addr').value = found;
            refreshMemory();
            refreshDasm();
            alert("Pattern found at " + found);
        } else {
            alert("Pattern not found.");
        }
    });
}

function toggleSwitch(idx, isDedicated) {
    const current = isDedicated ? dedicatedStates[idx] : switchStates[idx];
    const newVal = current ? 0 : 1;
    let swNum;
    if (isDedicated) swNum = idx + 1;
    else {
        const col = Math.floor(idx / 8);
        const row = idx % 8;
        if (col === 0) swNum = row + 1;
        else swNum = col * 10 + row + 1;
    }
    fetch(`/api/input?sw=${swNum}&val=${newVal}`).then(updateStatus);
}

function initMatrices() {
    const l = document.getElementById('matrix-lamps');
    const s = document.getElementById('matrix-sw');
    const sl = document.getElementById('matrix-sol');
    const dd = document.getElementById('matrix-ded');
    l.innerHTML = '';
    s.innerHTML = '';
    sl.innerHTML = '';
    dd.innerHTML = '';
    for (let i = 0; i < 64; i++) {
        l.innerHTML += `<div id="lamp-${i}" class="matrix-dot"></div>`;
        s.innerHTML += `<div id="sw-${i}" class="matrix-dot sw-clickable" onclick="toggleSwitch(${i}, false)"></div>`;
    }
    for (let i = 0; i < 32; i++) {
        sl.innerHTML += `<div id="sol-${i}" class="matrix-dot"></div>`;
    }
    for (let i = 0; i < 8; i++) {
        dd.innerHTML += `<div id="ded-${i}" class="matrix-dot sw-clickable" onclick="toggleSwitch(${i}, true)"></div>`;
    }
}

function drawSegment(ctx, x, y, val) {
    ctx.strokeStyle = "#ff2200";
    ctx.lineWidth = 2.2;
    ctx.lineCap = "round";
    ctx.shadowBlur = 3;
    ctx.shadowColor = "#ff0000";

    const segs = [
        [2, 0, 13, 0], // Bit 0: a (top)
        [15, 2, 15, 11], // Bit 1: b (right top)
        [15, 14, 15, 23], // Bit 2: c (right bottom)
        [2, 25, 13, 25], // Bit 3: d (bottom)
        [0, 14, 0, 23], // Bit 4: e (left bottom)
        [0, 2, 0, 11], // Bit 5: f (left top)
        [2, 12.5, 7, 12.5], // Bit 6: g1 (middle left)
        null, // Bit 7: Comma (handled below)
        [2, 2, 6.5, 11.5], // Bit 8: j (diag top left)
        [7.5, 2, 7.5, 11], // Bit 9: h (center top)
        [13, 2, 8.5, 11.5], // Bit 10: k (diag top right)
        [8, 12.5, 13, 12.5], // Bit 11: g2 (middle right)
        [13, 23, 8.5, 13.5], // Bit 12: m (diag bottom right)
        [7.5, 14, 7.5, 23], // Bit 13: i (center bottom)
        [2, 23, 6.5, 13.5], // Bit 14: l (diag bottom left)
        null // Bit 15: Period (handled below)
    ];

    for (let bit = 0; bit < 16; bit++) {
        if (val & (1 << bit)) {
            const pts = segs[bit];
            if (pts) {
                ctx.beginPath();
                ctx.moveTo(x + pts[0], y + pts[1]);
                ctx.lineTo(x + pts[2], y + pts[3]);
                ctx.stroke();
            }
        }
    }
    if (val & 0x8000) { // Bit 15: Period
        ctx.fillStyle = "#ff2200";
        ctx.beginPath();
        ctx.arc(x + 17, y + 25, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }
    if (val & 0x0080) { // Bit 7: Comma
        ctx.beginPath();
        ctx.moveTo(x + 17, y + 25);
        ctx.lineTo(x + 14, y + 30);
        ctx.stroke();
    }
}

function renderSegments(hex) {
    const canvas = document.getElementById('seg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 380;
    canvas.height = 80;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < 32; i++) {
        const val = parseInt(hex.substr(i * 4, 4), 16);
        if (isNaN(val)) continue;
        const x = (i % 16) * 22 + 10;
        const y = Math.floor(i / 16) * 35 + 10;
        drawSegment(ctx, x, y, val);
    }
}

function updateStatus() {
    fetch('/api/info').then(r => r.json()).then(data => {
        document.getElementById('game-title').innerText = data.game;
        document.getElementById('wpc-bank').innerText = data.wpc_bank === -1 ? "N/A" : "0x" + data.wpc_bank.toString(16).toUpperCase();
        isPaused = data.paused;
        const tag = document.getElementById('status-mode');
        tag.innerText = isPaused ? "PAUSED" : "RUNNING";
        tag.className = "status-tag " + (isPaused ? "status-paused" : "status-running");

        if (data.segments && data.segments.replace(/0/g, '') !== '') {
            document.getElementById('seg-container').style.display = 'block';
            document.getElementById('dmd-container').style.display = 'none';
            renderSegments(data.segments);
        } else {
            document.getElementById('seg-container').style.display = 'none';
            document.getElementById('dmd-container').style.display = 'block';
        }

        const lamps = data.lamps;
        const sws = data.switches;
        for (let i = 0; i < 64; i++) {
            const col = Math.floor(i / 8);
            const bit = i % 8;
            const isActive = (parseInt(sws.substr(col * 2, 2), 16) & (1 << bit));
            switchStates[i] = isActive;
            document.getElementById(`lamp-${i}`).className = `matrix-dot ${(parseInt(lamps.substr(col * 2, 2), 16) & (1 << bit)) ? 'active-lamp' : ''}`;
            document.getElementById(`sw-${i}`).className = `matrix-dot sw-clickable ${isActive ? 'active-sw' : ''}`;
        }
        for (let i = 0; i < 32; i++) {
            document.getElementById(`sol-${i}`).className = `matrix-dot ${(data.solenoids & (1 << i)) ? 'active-sol' : ''}`;
        }
        for (let i = 0; i < 8; i++) {
            const isActive = (data.dedicated & (1 << i));
            dedicatedStates[i] = isActive;
            document.getElementById(`ded-${i}`).className = `matrix-dot sw-clickable ${isActive ? 'active-sw' : ''}`;
        }
    }).catch(() => {
        document.getElementById('status-mode').innerText = "OFFLINE";
    });
}

function refreshDMD() {
    if (document.getElementById('dmd-container').style.display === 'none') return;
    fetch('/api/dmd/info').then(r => r.json()).then(info => {
        if (info.error) return;
        dmdWidth = info.width;
        dmdHeight = info.height;
        document.getElementById('dmd-res').innerText = `${dmdWidth}x${dmdHeight}`;
        return fetch('/api/dmd/raw');
    }).then(r => r ? r.arrayBuffer() : null).then(buf => {
        if (!buf) return;
        const canvas = document.getElementById('dmd-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = dmdWidth;
        canvas.height = dmdHeight;
        const imgData = ctx.createImageData(dmdWidth, dmdHeight);
        const bytes = new Uint8Array(buf);
        for (let i = 0; i < bytes.length; i++) {
            const v = bytes[i];
            const idx = i * 4;
            imgData.data[idx] = 255;
            imgData.data[idx + 1] = 150;
            imgData.data[idx + 2] = 0;
            imgData.data[idx + 3] = v;
        }
        ctx.putImageData(imgData, 0, 0);
    }).catch(() => {});
}

function refreshState() {
    fetch('/api/debugger/state').then(r => r.json()).then(data => {
        const container = document.getElementById('cpu-panels-container');
        container.innerHTML = '';
        if (!data.cpus) return;
        data.cpus.forEach(cpu => {
            if (cpu.id === 0 && lastPC !== cpu.pc) {
                lastPC = cpu.pc;
                if (isPaused) {
                    followPC();
                    refreshCallstack();
                }
            }
            const panel = document.createElement('div');
            panel.className = 'panel';
            panel.style.margin = '5px 10px';
            let regHtml = `<div class="reg-grid">`;
            for (const [reg, val] of Object.entries(cpu)) {
                if (reg === 'id' || reg === 'type') continue;
                regHtml += `<div class="reg-item"><span class="reg-label">${reg.toUpperCase()}</span><div><span class="reg-val">${val.toString(16).toUpperCase()}</span><span class="reg-dec">${val}</span></div></div>`;
            }
            if (cpu.cc !== undefined) {
                const flags = ['C', 'V', 'Z', 'N', 'I', 'H', 'F', 'E'];
                regHtml += `</div><div class="flags-grid">` + flags.map((f, i) => `<div class="flag ${(cpu.cc & (1 << i)) ? 'active' : ''}">${f}</div>`).reverse().join('') + `</div>`;
            } else {
                regHtml += `</div>`;
            }
            panel.innerHTML = `<h2>CPU ${cpu.id} (${cpu.type === 14 ? 'M6809' : 'ADSP'})</h2>` + regHtml;
            container.appendChild(panel);
        });
    });
}

function refreshDasm() {
    const addr = document.getElementById('dasm-addr').value;
    const cpu = document.getElementById('dasm-cpu').value;
    const bank = document.getElementById('dasm-bank').value;
    fetch(`/api/debugger/dasm?addr=${addr}&lines=25&cpu=${cpu}&bank=${bank}`).then(r => r.json()).then(data => {
        const table = document.getElementById('dasm-view');
        table.innerHTML = '';
        if (!data.lines) return;
        data.lines.forEach(line => {
            const row = table.insertRow();
            const a = parseInt(line.addr);
            if (a === lastPC && (data.bank === -1 || data.bank === parseInt(document.getElementById('wpc-bank').innerText, 16))) row.className = 'current-pc';
            const c1 = row.insertCell();
            c1.className = 'addr-col';
            c1.innerText = a.toString(16).toUpperCase().padStart(4, '0');
            row.insertCell().innerText = line.text;
            row.onclick = () => {
                document.getElementById('bp-addr').value = '0x' + a.toString(16).toUpperCase();
                document.getElementById('bp-bank').value = (data.bank === -1) ? '' : '0x' + data.bank.toString(16).toUpperCase();
            };
        });
    });
}

function followPC() {
    document.getElementById('dasm-addr').value = '0x' + lastPC.toString(16).toUpperCase();
    document.getElementById('dasm-bank').value = '';
    refreshDasm();
}

function refreshCallstack() {
    fetch('/api/debugger/callstack').then(r => r.json()).then(data => {
        const view = document.getElementById('callstack-view');
        view.innerHTML = '';
        if (!data.stack) return;
        data.stack.forEach(entry => {
            const div = document.createElement('div');
            div.className = 'stack-item';
            const bankHex = entry.bank.toString(16).toUpperCase();
            div.innerText = `PC: 0x${entry.pc.toString(16).toUpperCase()} Bank: 0x${bankHex}`;
            div.onclick = () => {
                document.getElementById('dasm-addr').value = '0x' + entry.pc.toString(16).toUpperCase();
                document.getElementById('dasm-bank').value = '0x' + bankHex;
                refreshDasm();
            };
            view.appendChild(div);
        });
    });
}

function refreshMessages() {
    fetch('/api/debugger/messages')
        .then(r => r.json())
        .then(data => {
            const log = document.getElementById('console-log');
            log.innerHTML = '';
            data.messages.forEach(m => {
                const div = document.createElement('div');
                div.className = 'console-line';
                div.innerText = `> ${m}`;
                log.appendChild(div);
            });
            log.scrollTop = log.scrollHeight;
        });
}

function refreshPoints() {
    fetch('/api/debugger/points')
        .then(r => r.json())
        .then(data => {
            const list = document.getElementById('point-list');
            list.innerHTML = '';
            data.breakpoints.forEach(p => addPointRow(list, 'bp', p.idx, p.addr, p.enabled, null, p.bank));
            data.watchpoints.forEach(p => addPointRow(list, 'wp', p.idx, p.addr, p.enabled, p.mode));
        });
}

function addPointRow(container, type, idx, addr, enabled, mode, bank) {
    const div = document.createElement('div');
    div.className = 'point-item';
    const label = mode ? `WP(${['', 'R', 'W', 'RW'][mode]})` : (bank !== -1 ? `BP(${bank.toString(16).toUpperCase()})` : 'BP');
    div.innerHTML = `<span class="point-addr ${enabled ? '' : 'point-disabled'}">${label} 0x${addr.toString(16).toUpperCase()}</span><div><button class="btn btn-small" onclick="pointAction('toggle','${type}',${idx})">${enabled ? 'Off' : 'On'}</button><button class="btn btn-danger btn-small" onclick="pointAction('delete','${type}',${idx})">X</button></div>`;
    container.appendChild(div);
}

function pointAction(cmd, type, idx) {
    fetch(`/api/debugger/points?cmd=${cmd}&type=${type}&idx=${idx}`)
        .then(() => refreshPoints());
}

function addPoint(type) {
    const addr = document.getElementById('bp-addr').value;
    const bank = document.getElementById('bp-bank').value;
    const url = type === 'bp' ?
        `/api/debugger/breakpoints?cmd=add&addr=${addr}&bank=${bank}` :
        `/api/debugger/watchpoints?cmd=add&addr=${addr}&mode=${document.getElementById('wp-mode').value}`;
    fetch(url)
        .then(() => {
            refreshPoints();
            refreshMessages();
        });
}

function refreshMemory() {
    const addr = document.getElementById('mem-addr').value;
    const size = document.getElementById('mem-size').value;
    const cpu = document.getElementById('mem-cpu').value;
    fetch(`/api/debugger/memory?addr=${addr}&size=${size}&cpu=${cpu}`).then(r => r.json()).then(data => {
        const table = document.getElementById('hex-view');
        table.innerHTML = '';
        if (!data.data) return;
        let row;
        let ascii = '';
        data.data.forEach((byte, i) => {
            if (i % 16 === 0) {
                if (i > 0) {
                    const c = row.insertCell();
                    c.className = 'hex-ascii';
                    c.innerText = ascii;
                }
                row = table.insertRow();
                ascii = '';
                const aCell = row.insertCell();
                aCell.className = 'addr-col';
                aCell.innerText = (parseInt(data.addr) + i).toString(16).toUpperCase().padStart(4, '0');
            }
            const c = row.insertCell();
            c.className = 'hex-byte';
            c.innerText = byte.toString(16).toUpperCase().padStart(2, '0');
            c.onclick = () => {
                const v = prompt(`Edit 0x${(parseInt(data.addr) + i).toString(16)}`, `0x${byte.toString(16)}`);
                if (v) fetch(`/api/debugger/memory/write?addr=${parseInt(data.addr) + i}&val=${v}&cpu=${cpu}`).then(() => refreshMemory());
            };
            ascii += (byte >= 32 && byte <= 126) ? String.fromCharCode(byte) : '.';
        });
        if (row) {
            while (row.cells.length < 17) row.insertCell();
            row.cells[16].className = 'hex-ascii';
            row.cells[16].innerText = ascii;
        }
    });
}

function runCLI() {
    const cmd = document.getElementById('cli-cmd').value;
    if (!cmd) return;
    fetch('/api/debugger/command?cmd=' + encodeURIComponent(cmd))
        .then(r => r.json())
        .then(() => {
            document.getElementById('cli-cmd').value = '';
            refreshMessages();
            refreshPoints();
            updateStatus();
            refreshState();
            refreshMemory();
            refreshDasm();
        });
}
document.getElementById('cli-cmd').onkeydown = (e) => {
    if (e.key === 'Enter')
        runCLI();
};
initMatrices();
setInterval(updateStatus, 1000);
setInterval(refreshState, 1000);
setInterval(refreshMessages, 1000);
setInterval(refreshPoints, 2000);
setInterval(() => {
    if (document.getElementById('auto-refresh-dmd').checked)
        refreshDMD();
}, 500);
updateStatus();
refreshState();
refreshMemory();
refreshDasm();
refreshPoints();
    </script>
</body>
</html>
